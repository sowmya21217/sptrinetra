<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Trinetra mark">
  <defs>
    <radialGradient id="iris" cx="50%" cy="42%" r="62%">
      <stop offset="0" stop-color="#F4B65C"/>
      <stop offset="0.55" stop-color="#E08A2B"/>
      <stop offset="1" stop-color="#D2452F"/>
    </radialGradient>
  </defs>
  <!-- tripundra: three sacred ash lines -->
  <g stroke-linecap="round" fill="none">
    <line x1="45" y1="26" x2="75" y2="26" stroke="#E08A2B" stroke-width="5.4"/>
    <line x1="41" y1="37" x2="79" y2="37" stroke="#D2452F" stroke-width="5.4"/>
    <line x1="45" y1="48" x2="75" y2="48" stroke="#E08A2B" stroke-width="5.4"/>
  </g>
  <!-- third-eye fire -->
  <path d="M60 52 C63 56 63 58 60 60 C57 58 57 56 60 52 Z" fill="#D2452F"/>
  <!-- the eye (almond) -->
  <path d="M60 60 Q78 81 60 102 Q42 81 60 60 Z" fill="#FBF4E8" stroke="#1E2340" stroke-width="3.2" stroke-linejoin="round"/>
  <circle cx="60" cy="81" r="11.5" fill="url(#iris)"/>
  <circle cx="60" cy="81" r="5" fill="#1E2340"/>
  <circle cx="62" cy="78.5" r="1.7" fill="#FFFFFF"/>
</svg>